<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="card">
        <h1>Створення акаунта</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button id="signup-btn">Зареєструватися</button>
        <p id="status"></p>
    </div>

    <script>

    // Цей код чекає, поки завантажиться весь HTML
    document.addEventListener('DOMContentLoaded', () => {
        const supabaseUrl = 'https://diimxykjkbwyeynjyill.supabase.co';
        const supabaseKey = 'sb_publishable_PRDZd3BCgnLA9qytEtTXzA_FTa8_QgF';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const btn = document.getElementById('signup-btn');
        
        btn.addEventListener('click', async () => {
            console.log("Кнопка натиснута!"); // Тепер це має спрацювати!
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabase.auth.signUp({ 
                email: email, 
                password: password 
            });
            
            if (error) {
                console.error("Помилка Supabase:", error);
                document.getElementById('status').innerText = "Помилка: " + error.message;
            } else {
                document.getElementById('status').innerText = "Перевір пошту для підтвердження!";
            }
        });
    });
</script>
    </script>
</body>
</html>
