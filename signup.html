<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Створення акаунта</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button id="signup-btn">Зареєструватися</button>
        <p id="status"></p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const supabaseUrl = 'https://diimxykjkbwyeynjyill.supabase.co';
            const supabaseKey = 'sb_publishable_PRDZd3BCgnLA9qytEtTXzA_FTa8_QgF';
            const client = supabase.createClient(supabaseUrl, supabaseKey);

            const btn = document.getElementById('signup-btn');
            
            btn.addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const { data, error } = await client.auth.signUp({ 
                    email: email, 
                    password: password 
                });
                
                if (error) {
                    document.getElementById('status').innerText = "Помилка: " + error.message;
                } else {
                    // Перенаправлення після успішної реєстрації
                    window.location.href = 'dashboard.html';
                }
            });
        });
    </script>
</body>
</html>
