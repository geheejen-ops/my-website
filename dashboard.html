<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій Кабінет</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 100px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .user-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 20px 0; color: #555; border: 1px solid #ddd; }
        .btn-out { background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Вітаємо в клубі! 🎉</h2>
        <div class="user-box" id="user-display">Завантаження...</div>
        <button class="btn-out" id="logout">Вийти з системи</button>
    </div>

    <script>
        const client = supabase.createClient('https://diimxykjkbwyeynjyill.supabase.co', 'sb_publishable_PRDZd3BCgnLA9qytEtTXzA_FTa8_QgF');
        
        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) window.location.href = 'signup.html';
            else document.getElementById('user-display').innerText = user.email;
        }

        document.getElementById('logout').onclick = async () => {
            await client.auth.signOut();
            window.location.href = 'signup.html';
        };
        checkUser();
    </script>
</body>
</html>
