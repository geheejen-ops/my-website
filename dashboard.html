<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Твій профіль</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 100px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .user-email { background: #e7f3ff; color: #007bff; padding: 10px; border-radius: 8px; margin: 20px 0; font-weight: bold; }
        button { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Привіт! 🎉</h1>
        <p>Ти увійшов у систему як:</p>
        <div id="user-display" class="user-email">Завантаження...</div>
        <button id="logout-btn">Вийти з акаунту</button>
    </div>

    <script>
        const client = supabase.createClient('https://diimxykjkbwyeynjyill.supabase.co', 'sb_publishable_PRDZd3BCgnLA9qytEtTXzA_FTa8_QgF');
        
        async function loadProfile() {
            const { data: { user } } = await client.auth.getUser();
            if (user) {
                document.getElementById('user-display').innerText = user.email;
            } else {
                window.location.href = 'index.html'; // Повертаємо на реєстрацію, якщо користувача немає
            }
        }

        document.getElementById('logout-btn').onclick = async () => {
            await client.auth.signOut();
            window.location.href = 'index.html';
        };

        loadProfile();
    </script>
</body>
</html>
